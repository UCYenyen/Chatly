name: Deploy Chatly Server

on:
  push:
    branches: [system-prompts]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase Repo Name
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Generate .env.production
        run: |
          echo "NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}" >> .env.production
          echo "XENDIT_CALLBACK_TOKEN=${{ secrets.XENDIT_CALLBACK_TOKEN }}" >> .env.production
          echo "BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }}" >> .env.production
          echo "BETTER_AUTH_URL=${{ secrets.BETTER_AUTH_URL }}" >> .env.production
          echo "GMAIL_USER=${{ secrets.GMAIL_USER }}" >> .env.production
          echo "GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}" >> .env.production
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> .env.production
          echo "XENDIT_SECRET_KEY=${{ secrets.XENDIT_SECRET_KEY }}" >> .env.production
          echo "NEXT_PUBLIC_XENDIT_KEY=${{ secrets.NEXT_PUBLIC_XENDIT_KEY }}" >> .env.production
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env.production
          echo "GOWA_API_BASE=${{ secrets.GOWA_API_BASE }}" >> .env.production
          echo "GOWA_BASIC_AUTH_USER=${{ secrets.GOWA_BASIC_AUTH_USER }}" >> .env.production
          echo "GOWA_BASIC_AUTH_PASS=${{ secrets.GOWA_BASIC_AUTH_PASS }}" >> .env.production
          echo "GOWA_WEBHOOK_SECRET=${{ secrets.GOWA_WEBHOOK_SECRET }}" >> .env.production

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml via SSH
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "./docker-compose.yml"
          target: "/var/www/websites/bryan/Chatly"

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/websites/bryan/Chatly

            # Login to GHCR on the VPS
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull the latest image
            docker compose pull

            # Restart containers with the new image
            docker compose up -d

            # Clean up old images to save disk space
            docker image prune -f
